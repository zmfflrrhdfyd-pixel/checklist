<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="방문체크">
<title>고대안암 방문 체크리스트</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,'Apple SD Gothic Neo',sans-serif;background:#F0F4F8;min-height:100vh;padding-bottom:60px;}
.header{background:linear-gradient(135deg,#1A3A5C 0%,#2E6B9E 100%);padding:50px 16px 16px;color:#fff;}
.header-sub{font-size:11px;opacity:.7;margin-bottom:4px;}
.header-title{font-size:20px;font-weight:700;margin-bottom:2px;}
.header-week{font-size:13px;opacity:.8;}
.progress-wrap{margin-top:14px;}
.progress-label{display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px;}
.progress-bar{background:rgba(255,255,255,.2);border-radius:99px;height:8px;}
.progress-fill{background:#4ECDC4;border-radius:99px;height:8px;transition:width .4s;}
.sticky-bar{position:sticky;top:0;z-index:20;background:#fff;border-bottom:1px solid #E8EDF2;box-shadow:0 2px 8px rgba(0,0,0,.06);}
.filter-bar{display:flex;gap:6px;padding:10px 16px;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.filter-btn{padding:6px 12px;border-radius:99px;border:none;font-size:12px;cursor:pointer;white-space:nowrap;background:#EEF2F7;color:#555;flex-shrink:0;}
.filter-btn.active{background:#1A3A5C;color:#fff;font-weight:700;}
.reset-btn{margin-left:auto;padding:6px 12px;border-radius:99px;border:1px solid #E74C3C;background:#fff;color:#E74C3C;font-size:12px;cursor:pointer;white-space:nowrap;flex-shrink:0;}
.search-wrap{padding:8px 16px;}
.search-input{width:100%;padding:8px 12px;border-radius:8px;border:1.5px solid #D0DCE8;font-size:14px;outline:none;font-family:inherit;}
.day-tabs{display:flex;gap:0;padding:0 16px 10px;}
.day-tab{flex:1;padding:7px 0;text-align:center;font-size:12px;font-weight:700;cursor:pointer;border-radius:8px;color:#aaa;transition:all .15s;}
.day-tab.active{color:#fff;}
.list{padding:10px 16px;display:flex;flex-direction:column;gap:8px;}
.dept-card{background:#fff;border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,.08);overflow:hidden;transition:box-shadow .2s;}
.dept-card.is-key{box-shadow:0 2px 10px rgba(26,58,92,.15);border:1.5px solid #2E6B9E22;}
.dept-header{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;cursor:pointer;}
.dept-header.done{background:#F0FBF8;}
.dept-header.is-key{background:#F0F6FF;}
.dept-left{display:flex;align-items:center;gap:7px;flex:1;}
.dept-badge{color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:6px;flex-shrink:0;}
.dept-name{font-weight:600;font-size:13px;color:#1A2B3C;}
.dept-right{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.dept-count{font-size:12px;font-weight:700;color:#888;}
.dept-count.done{color:#27AE60;}
.star-btn{background:none;border:none;font-size:18px;cursor:pointer;padding:2px 4px;line-height:1;transition:transform .2s;}
.star-btn:active{transform:scale(1.3);}
.prof-list{border-top:1px solid #F0F4F8;}
.prof-item{padding:9px 14px;border-bottom:1px solid #F5F7FA;}
.prof-item:last-child{border-bottom:none;}
.prof-item.visited{background:#FAFFFE;}
.prof-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;}
.prof-name{font-size:13px;font-weight:600;color:#1A2B3C;}
.prof-name.visited{color:#1A7A5E;}
.visit-badge{background:#4ECDC4;color:#fff;font-size:9px;font-weight:700;padding:1px 5px;border-radius:99px;margin-left:5px;}
.note-btn{background:#F5F7FA;border:none;border-radius:6px;padding:3px 7px;font-size:10px;color:#888;cursor:pointer;}
.note-btn.has-note{background:#EEF7FF;color:#2E6B9E;}
.note-display{font-size:11px;color:#555;background:#EEF7FF;border-radius:6px;padding:4px 8px;margin-bottom:6px;}
.slot-btns{display:flex;gap:5px;flex-wrap:wrap;}
.slot-btn{padding:5px 10px;border-radius:7px;border:none;font-size:11px;font-weight:700;cursor:pointer;transition:all .15s;}
.slot-btn.checked{color:#fff;}
.slot-btn.unchecked{background:#F8FAFC;}
.key-divider{display:flex;align-items:center;gap:8px;padding:6px 0 4px;}
.key-divider-line{flex:1;height:1px;background:#D0DCE8;}
.key-divider-text{font-size:11px;color:#888;font-weight:600;white-space:nowrap;}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:flex-end;z-index:999;}
.modal-bg.open{display:flex;}
.modal{background:#fff;width:100%;border-radius:16px 16px 0 0;padding:20px 16px 40px;}
.modal-title{font-size:15px;font-weight:700;margin-bottom:12px;color:#1A2B3C;}
.modal-textarea{width:100%;height:90px;padding:12px;border-radius:8px;border:1.5px solid #D0DCE8;font-size:14px;resize:none;outline:none;font-family:inherit;}
.modal-btns{display:flex;gap:8px;margin-top:10px;}
.modal-cancel{flex:1;padding:12px;border-radius:10px;border:1px solid #ddd;background:#fff;font-size:14px;cursor:pointer;color:#555;}
.modal-save{flex:2;padding:12px;border-radius:10px;border:none;background:#1A3A5C;color:#fff;font-size:14px;font-weight:700;cursor:pointer;}
.empty{text-align:center;padding:40px 16px;color:#aaa;font-size:14px;}
.key-hint{font-size:11px;color:#2E6B9E;padding:4px 16px 0;opacity:.8;}
</style>
</head>
<body>
<div class="header">
  <div class="header-sub">고대안암병원 전체</div>
  <div class="header-title">주간 방문 체크리스트</div>
  <div class="header-week" id="weekLabel"></div>
  <div class="progress-wrap">
    <div class="progress-label"><span>이번 주 방문</span><span id="progressText"></span></div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  </div>
</div>

<div class="sticky-bar">
  <div class="filter-bar">
    <button class="filter-btn active" onclick="setFilter('all',this)">전체</button>
    <button class="filter-btn" onclick="setFilter('key',this)">⭐주력과</button>
    <button class="filter-btn" onclick="setFilter('unchecked',this)">미방문</button>
    <button class="filter-btn" onclick="setFilter('checked',this)">방문완료</button>
    <button class="reset-btn" onclick="resetWeek()">🗑초기화</button>
  </div>
  <div class="search-wrap">
    <input class="search-input" type="search" placeholder="🔍 교수님 이름 검색..." oninput="onSearch(this.value)">
  </div>
  <div class="day-tabs" id="dayTabs"></div>
  <div class="key-hint">⭐ 별표를 눌러 주력과를 자유롭게 설정하세요</div>
</div>

<div class="list" id="list"></div>

<div class="modal-bg" id="modalBg" onclick="closeModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title">메모 작성</div>
    <textarea class="modal-textarea" id="noteInput" placeholder="특이사항, 면담 내용, 요청사항 등"></textarea>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeModal()">취소</button>
      <button class="modal-save" onclick="saveNote()">저장</button>
    </div>
  </div>
</div>

const DEFAULT_KEYS = new Set(['ENDO','GI','NR','NS','OS','RH','NE','FM','OG','OPH','BES','ENT','ID']);
const DAYS=['월','화','수','목','금'];
const DAY_COLORS={월:'#4A90D9',화:'#E67E22',수:'#27AE60',목:'#8E44AD',금:'#E74C3C'};

let checks={}, notes={}, openDepts={}, keyDepts=new Set(), filter='all', searchQ='', selectedDay='전체', editingKey=null;

function getWeekKey(){
  const now=new Date(),d=now.getDay();
  const diff=now.getDate()-d+(d===0?-6:1);
  const mon=new Date(new Date().setDate(diff));
  return `cl_v4_${mon.getFullYear()}_${mon.getMonth()+1}_${mon.getDate()}`;
}
function getWeekLabel(){
  const now=new Date(),d=now.getDay();
  const diff=now.getDate()-d+(d===0?-6:1);
  const mon=new Date(new Date().setDate(diff));
  const fri=new Date(mon); fri.setDate(mon.getDate()+4);
  return `📅 ${mon.getMonth()+1}/${mon.getDate()} ~ ${fri.getMonth()+1}/${fri.getDate()}`;
}
const WK=getWeekKey();

function load(){
  try{
    const r=localStorage.getItem(WK);
    if(r){const d=JSON.parse(r); checks=d.checks||{}; notes=d.notes||{};}
    const ks=localStorage.getItem('keyDepts_v4');
    keyDepts=ks?new Set(JSON.parse(ks)):new Set(DEFAULT_KEYS);
  }catch(e){keyDepts=new Set(DEFAULT_KEYS);}
  DEPTS_RAW.forEach(d=>openDepts[d.code]=keyDepts.has(d.code));
  document.getElementById('weekLabel').textContent=getWeekLabel();
  renderDayTabs();
  render();
}

function save(){
  try{localStorage.setItem(WK,JSON.stringify({checks,notes}));}catch(e){}
}
function saveKeys(){
  try{localStorage.setItem('keyDepts_v4',JSON.stringify([...keyDepts]));}catch(e){}
}

function toggleKey(code, e){
  e.stopPropagation();
  if(keyDepts.has(code)) keyDepts.delete(code);
  else keyDepts.add(code);
  saveKeys();
  render();
}

function isChecked(dept,prof,slot){return !!checks[`${dept}_${prof}_${slot}`];}
function visitCount(dept,prof){
  const p=DEPTS_RAW.find(d=>d.code===dept)?.professors.find(p=>p.name===prof);
  return p?p.slots.filter(s=>isChecked(dept,prof,s)).length:0;
}

function toggleCheck(dept,prof,slot){
  const k=`${dept}_${prof}_${slot}`;
  checks[k]=!checks[k];
  save(); render();
}
function setFilter(f,btn){
  filter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}
function setDay(day){selectedDay=day; renderDayTabs(); render();}
function onSearch(q){searchQ=q.trim(); render();}
function toggleDept(code){openDepts[code]=!openDepts[code]; render();}
function openNote(key){
  editingKey=key;
  document.getElementById('noteInput').value=notes[key]||'';
  document.getElementById('modalBg').classList.add('open');
  setTimeout(()=>document.getElementById('noteInput').focus(),100);
}
function closeModal(){document.getElementById('modalBg').classList.remove('open'); editingKey=null;}
function saveNote(){
  if(!editingKey)return;
  const v=document.getElementById('noteInput').value.trim();
  if(v)notes[editingKey]=v; else delete notes[editingKey];
  save(); render(); closeModal();
}
function resetWeek(){
  if(confirm('이번 주 체크를 전부 초기화할까요?')){checks={}; notes={}; save(); render();}
}

function renderDayTabs(){
  const all=['전체',...DAYS];
  document.getElementById('dayTabs').innerHTML=all.map(d=>{
    const color=d==='전체'?'#1A3A5C':DAY_COLORS[d];
    const active=selectedDay===d;
    return `<div class="day-tab${active?' active':''}" style="${active?`background:${color};color:#fff`:''}" onclick="setDay('${d}')">${d==='전체'?'전체':d+'요일'}</div>`;
  }).join('');
}

function updateProgress(){
  const total=DEPTS_RAW.reduce((s,d)=>s+d.professors.length,0);
  const visited=DEPTS_RAW.reduce((s,d)=>s+d.professors.filter(p=>visitCount(d.code,p.name)>0).length,0);
  const pct=Math.round(visited/total*100);
  document.getElementById('progressText').textContent=`${visited}/${total}명 (${pct}%)`;
  document.getElementById('progressFill').style.width=pct+'%';
}

function getVisibleSlots(slots){
  if(selectedDay==='전체') return slots;
  return slots.filter(s=>s.startsWith(selectedDay));
}

function renderDeptCard(dept){
  const isKey=keyDepts.has(dept.code);
  let profs=dept.professors.filter(p=>{
    if(searchQ&&!p.name.includes(searchQ)) return false;
    const vis=getVisibleSlots(p.slots);
    if(vis.length===0) return false;
    const cnt=visitCount(dept.code,p.name);
    if(filter==='checked'&&cnt===0) return false;
    if(filter==='unchecked'&&cnt>0) return false;
    return true;
  });
  if(filter==='key'&&!isKey) return '';
  if(profs.length===0) return '';

  const deptVisited=dept.professors.filter(p=>visitCount(dept.code,p.name)>0).length;
  const allDone=deptVisited===dept.professors.length;
  const isOpen=openDepts[dept.code];
  const bgColor=allDone?'#27AE60':isKey?'#1A3A5C':'#8899AA';

  let html=`<div class="dept-card${isKey?' is-key':''}">
    <div class="dept-header${allDone?' done':''}${isKey?' is-key':''}" onclick="toggleDept('${dept.code}')">
      <div class="dept-left">
        <span class="dept-badge" style="background:${bgColor}">${dept.code}</span>
        <span class="dept-name">${dept.name}</span>
        ${allDone?'<span style="font-size:11px">✅</span>':''}
      </div>
      <div class="dept-right">
        <span class="dept-count${allDone?' done':''}">${deptVisited}/${dept.professors.length}</span>
        <button class="star-btn" onclick="toggleKey('${dept.code}',event)" title="주력과 설정">${isKey?'⭐':'☆'}</button>
        <span style="color:#aaa;font-size:12px">${isOpen?'▲':'▼'}</span>
      </div>
    </div>`;

  if(isOpen){
    html+=`<div class="prof-list">`;
    for(const prof of profs){
      const cnt=visitCount(dept.code,prof.name);
      const nk=`${dept.code}_${prof.name}`;
      const hasNote=!!notes[nk];
      const vis=getVisibleSlots(prof.slots);
      html+=`<div class="prof-item${cnt>0?' visited':''}">
        <div class="prof-top">
          <div>
            <span class="prof-name${cnt>0?' visited':''}">${prof.name} 교수님</span>
            ${cnt>0?`<span class="visit-badge">✓${cnt}</span>`:''}
          </div>
          <button class="note-btn${hasNote?' has-note':''}" onclick="openNote('${nk}')">${hasNote?'📝':'+ 메모'}</button>
        </div>
        ${hasNote?`<div class="note-display">${notes[nk]}</div>`:''}
        <div class="slot-btns">`;
      for(const slot of vis){
        const day=slot[0];
        const isAM=slot.endsWith('AM');
        const color=DAY_COLORS[day];
        const checked=isChecked(dept.code,prof.name,slot);
        html+=`<button class="slot-btn ${checked?'checked':'unchecked'}"
          style="${checked?`background:${color}`:`color:${color};border:1.5px solid ${color}44`}"
          onclick="toggleCheck('${dept.code}','${prof.name}','${slot}')">
          ${day}${isAM?'오전':'오후'}${checked?' ✓':''}
        </button>`;
      }
      html+=`</div></div>`;
    }
    html+=`</div>`;
  }
  html+=`</div>`;
  return html;
}

function render(){
  updateProgress();
  const keyDepts_arr=DEPTS_RAW.filter(d=>keyDepts.has(d.code));
  const otherDepts=DEPTS_RAW.filter(d=>!keyDepts.has(d.code));

  let html='';
  const keyCards=keyDepts_arr.map(renderDeptCard).filter(Boolean);
  const otherCards=otherDepts.map(renderDeptCard).filter(Boolean);

  if(keyCards.length>0){
    if(filter!=='key') html+=`<div class="key-divider"><div class="key-divider-line"></div><div class="key-divider-text">⭐ 주력과</div><div class="key-divider-line"></div></div>`;
    html+=keyCards.join('');
  }
  if(otherCards.length>0&&filter!=='key'){
    if(keyCards.length>0) html+=`<div class="key-divider" style="margin-top:4px"><div class="key-divider-line"></div><div class="key-divider-text">전체 진료과</div><div class="key-divider-line"></div></div>`;
    html+=otherCards.join('');
  }
  if(!html) html=`<div class="empty">해당하는 교수님이 없어요 🙅</div>`;
  document.getElementById('list').innerHTML=html;
}

load();
</script>
</body>
</html>
